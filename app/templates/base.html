<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale-1">
        {% if title %}
            <title> {{ title }} - Nova</title>
        {% else %}
            <title> Flask Templates Demo</title>
        {% endif %}
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
         rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous">
          <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    </head>
    <body>

        <!-- Start of navbar -->
        <div class="navbar">
            <nav class="navbar navbar-expand-lg fixed-top">
                <div class=" nav container-fluid">
                    {% if current_user.is_authenticated %}
                        <a class="navbar-brand d-flex" href="{{ url_for('feed') }}">Nova<div style="color: rgb(168, 143, 70);"><p>.</p></div></a>

                        <div class="collapse navbar-collapse" id="navbarNav">
                            <ul class="navbar-nav ms-auto">
                                <li>
                                    <a class="btn-7" aria-current="page" href="{{ url_for('feed') }}">Feed</a>
                                </li>

                                <div class="dropdown">
                                    
                                </div>
                                                
                            </ul>
                        </div>

                    {% else %}
                        <a class="navbar-brand d-flex" href="{{ url_for('index') }}">Nova<div style="color: rgb(168, 143, 70);"><p>.</p></div></a>    
                        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                            <span class="navbar-toggler-icon"></span>
                        </button>
                        <div class="collapse nav-links-pg-1 navbar-collapse" id="navbarNav">
                            <ul class="navbar-nav ms-auto">
                                <li>
                                    <a class="btn-6" aria-current="page" href="{{ url_for('sign_in') }}">Sign in</a>
                                </li>
                                <li class="nav-item">
                                    <a href="{{ url_for('register') }}" class="btn-1 rounded-pill">Get Started</a>
                                </li>
                                            
                            </ul>
                        </div>
                    {% endif %}
                </div>
            </nav>    
        </div>
        
        
        <!-- end of navbar -->       
        <div>
            {% block content %}
            {% endblock %}
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
         integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
         crossorigin="anonymous"></script>
    </body>
</html>
